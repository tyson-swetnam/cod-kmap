name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The site runs as plain static files — index.html uses an importmap to
      # load maplibre-gl and @duckdb/duckdb-wasm from esm.sh at runtime, so
      # there is no bundle step. Stage a site directory that mirrors what
      # Vite would produce (public/ flattened to root, src/ kept as-is).
      - name: Stage static site
        run: |
          set -eu
          mkdir -p _site
          cp -R web/public/. _site/
          cp web/index.html _site/
          cp -R web/src _site/src
          echo "Staged files:"
          find _site -maxdepth 2 -type f | sort

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
